    <section class="landing-context">
      <p>
        Welcome to the personal website of Dominik Mecko focused on data science,
        environmental economics, and photography.
      </p>
    </section>
    <script>
        const phrases = [
          { text: "Dominik Mecko", font: "hand" },
          { text: "Data Scientist", font: "code" },
          { text: "Environmental Economist", font: "code" },
          { text: "Photographer", font: "hand" },
        ];

        const title = document.getElementById("titleText");
        const cursor = document.querySelector(".cursor");

        let phraseIndex = 0;
        let charIndex = 0;
        let typingSpeed = 80;
        let deletingSpeed = 40;
        let pause = 1200; 
        let phase = "typing";

        function typeRotate() {
          const currentPhrase = phrases[phraseIndex];

          
          title.className = currentPhrase.font;

          if (phase === "typing") {
            title.textContent = currentPhrase.text.slice(0, charIndex++);
            if (charIndex <= currentPhrase.text.length) {
              setTimeout(typeRotate, typingSpeed);
            } else {
              phase = "pause";
              setTimeout(typeRotate, pause);
            }
          }

          else if (phase === "pause") {
            phase = "deleting";
            setTimeout(typeRotate, deletingSpeed);
          }

          else if (phase === "deleting") {
            charIndex--;
            title.textContent = currentPhrase.text.slice(0, charIndex);
            if (charIndex > 0) {
              setTimeout(typeRotate, deletingSpeed);
            } else {
              phraseIndex = (phraseIndex + 1) % phrases.length;
              phase = "typing";
              setTimeout(typeRotate, typingSpeed);
            }
          }
        }

        typeRotate();
      </script>
